runtime: python27
api_version: 1
threadsafe: yes

handlers:
- url: /static/
  static_dir: static

- url: /css/
  static_dir: static/css

- url: /js/
  static_dir: static/js

- url: /lib/
  static_dir: static/lib

- url: /json/
  static_dir: static/json

- url: /favicon\.ico
  static_files: static/images/favicon.ico
  upload: static/images/favicon.ico

- url: /apple-touch-icon\.png
  static_files: static/images/apple-touch-icon.png
  upload: static/images/apple-touch-icon.png

- url: /apple-touch-icon-precomposed\.png
  static_files: static/images/apple-touch-icon-precomposed.png
  upload: static/images/apple-touch-icon-precomposed.png

- url: /.*
  script: main.app
  
libraries:
- name: webapp2
  version: latest
- name: jinja2
  version: latest